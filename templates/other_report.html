<!DOCTYPE html>
<html>

<head>

<title>その他報告</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:80px;
}

.container{
    width:700px;
    margin:auto;
}

h1{
    color:#00aaff;
}

textarea{
    width:100%;
    height:200px;
    font-size:20px;
    padding:15px;
    background:#222;
    color:white;
    border:2px solid #00aaff;
    border-radius:10px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.send{
    background:#00aaff;
    color:white;
}

.back{
    background:#444;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>🔵 その他報告</h1>

<p>
内容を入力してください
</p>

<form action="/send_other/{{ area }}/{{ number }}" method="post">

<textarea
name="detail"
placeholder="報告内容を入力"></textarea>

<br>

<button class="send" type="submit">
送信
</button>

</form>

<br>

<a href="/operator/{{ area }}/{{ number }}">

<button class="back">
戻る
</button>

</a>

</div>

</body>

</html>
